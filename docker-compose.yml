services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - apps/api/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - apps/web/.env
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

